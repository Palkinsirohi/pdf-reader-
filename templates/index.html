<!DOCTYPE html>
<html>
<head>
    <title>Local RAG App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>PDF Question Answering System</h1>

        <form method="POST">

            <textarea 
                name="question"
                placeholder="Ask question from PDF..."
                required
            ></textarea>

            <button type="submit">
                Ask Question
            </button>

        </form>

        {% if answer %}

        <div class="answer-box">
            <h2>Answer:</h2>
            <p>{{ answer }}</p>
        </div>

        {% endif %}

    </div>

</body>
</html>
